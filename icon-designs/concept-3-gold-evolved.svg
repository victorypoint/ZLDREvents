<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="384" height="384">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="60%" stop-color="#E8A800"/>
      <stop offset="100%" stop-color="#C88800"/>
    </linearGradient>
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#00000033"/>
    </linearGradient>
  </defs>

  <!-- Gold background -->
  <rect width="192" height="192" rx="38" fill="url(#goldGrad)"/>
  <!-- Subtle inner shadow at bottom -->
  <rect width="192" height="192" rx="38" fill="url(#shadowGrad)"/>

  <!-- Thin top band - dark stripe for contrast -->
  <rect x="0" y="0" width="192" height="38" rx="38" fill="#00000018"/>
  <rect x="0" y="18" width="192" height="20" fill="#00000018"/>

  <!-- Club / cycle motif: two concentric ring arcs suggesting a wheel -->
  <circle cx="96" cy="155" r="28" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.2"/>
  <circle cx="96" cy="155" r="18" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.15"/>

  <!-- ZLDR — dark charcoal, very bold -->
  <text x="96" y="98"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="62"
        fill="#1A1508"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-2">ZLDR</text>

  <!-- Thin rule -->
  <line x1="32" y1="122" x2="160" y2="122" stroke="#1A150855" stroke-width="1.5"/>

  <!-- EVENTS label -->
  <text x="96" y="141"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="800"
        font-size="13"
        fill="#1A1508BB"
        text-anchor="middle"
        letter-spacing="5">EVENTS</text>
</svg>
