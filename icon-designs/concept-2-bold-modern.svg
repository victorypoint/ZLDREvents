<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="384" height="384">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0D1525"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg2)"/>

  <!-- Accent bar top-left corner detail -->
  <rect x="0" y="0" width="6" height="192" rx="3" fill="#3B82F6" opacity="0.6"/>

  <!-- Large Z lettermark — white, structural -->
  <text x="26" y="130"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="130"
        fill="#FFFFFF"
        opacity="0.07"
        dominant-baseline="auto"
        letter-spacing="-4">Z</text>

  <!-- ZLDR — white, bold -->
  <text x="96" y="78"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="38"
        fill="#FFFFFF"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-1">ZLDR</text>

  <!-- Blue accent underline -->
  <rect x="44" y="101" width="104" height="3" rx="1.5" fill="#3B82F6"/>

  <!-- EVENTS label -->
  <text x="96" y="122"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="800"
        font-size="22"
        fill="#3B82F6"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="1">EVENTS</text>
</svg>
