<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZLDR Events — Icon Concepts</title>
<style>
  body { background: #2a2a2a; font-family: Arial, sans-serif; color: #eee; margin: 0; padding: 40px; }
  h1 { font-size: 18px; margin-bottom: 32px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; }
  .grid { display: flex; gap: 48px; flex-wrap: wrap; align-items: flex-start; }
  .card { text-align: center; }
  .card img { display: block; width: 192px; height: 192px; border-radius: 38px; box-shadow: 0 8px 32px #0008; }
  .card .round { border-radius: 50%; margin-top: 12px; }
  .card .circle-crop { border-radius: 50%; margin-top: 12px; width: 192px; height: 192px; object-fit: cover; }
  .label { margin-top: 14px; font-size: 13px; color: #aaa; letter-spacing: 1px; }
  .sublabel { margin-top: 4px; font-size: 11px; color: #666; }
  .current img { opacity: 0.7; }
</style>
</head>
<body>
<h1>ZLDR Events — Icon Concepts</h1>
<div class="grid">

  <div class="card current">
    <img src="../app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" alt="Current">
    <img src="../app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png" class="round" alt="Current round">
    <div class="label">Current</div>
  </div>

  <div class="card">
    <img src="concept-1-dark-power.svg" alt="Concept 1">
    <img src="concept-1-dark-power.svg" class="round" alt="Concept 1 round">
    <div class="label">Concept 1 — Dark Power</div>
    <div class="sublabel">Dark bg · Orange ZLDR · speed lines</div>
  </div>

  <div class="card">
    <img src="concept-2-bold-modern.svg" alt="Concept 2">
    <img src="concept-2-bold-modern.svg" class="round" alt="Concept 2 round">
    <div class="label">Concept 2 — Bold Modern</div>
    <div class="sublabel">Navy bg · White ZLDR · Blue accent</div>
  </div>

  <div class="card">
    <img src="concept-3-gold-evolved.svg" alt="Concept 3">
    <img src="concept-3-gold-evolved.svg" class="round" alt="Concept 3 round">
    <div class="label">Concept 3 — Gold Evolved</div>
    <div class="sublabel">Richer gold · Dark lettermark · refined</div>
  </div>

</div>
</body>
</html>
