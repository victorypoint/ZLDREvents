<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Transparent background — ic_launcher_background supplies the dark navy -->

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="192" rx="3" fill="#3B82F6" opacity="0.6"/>

  <!-- Ghost Z lettermark -->
  <text x="26" y="130"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="130"
        fill="#FFFFFF"
        opacity="0.07"
        dominant-baseline="auto"
        letter-spacing="-4">Z</text>

  <!-- ZLDR -->
  <text x="100" y="78"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="52"
        fill="#FFFFFF"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-1">ZLDR</text>

  <!-- Blue accent underline -->
  <rect x="28" y="106" width="136" height="3" rx="1.5" fill="#3B82F6"/>

  <!-- EVENTS -->
  <text x="100" y="152"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="800"
        font-size="28"
        fill="#3B82F6"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="2">EVENTS</text>
</svg>
