<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Outer area is transparent — launcher circle mask clips here, not on the card -->
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0D1525"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="22" y="22" width="148" height="148" rx="28"/>
    </clipPath>
  </defs>

  <!-- Rounded-square card — this shape survives any launcher mask -->
  <rect x="22" y="22" width="148" height="148" rx="28" fill="url(#cardGrad)"/>

  <!-- Left accent bar, clipped to card -->
  <rect x="22" y="22" width="7" height="148" rx="3" fill="#3B82F6" opacity="0.55" clip-path="url(#cardClip)"/>

  <!-- Ghost Z -->
  <text x="38" y="148"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="118"
        fill="#FFFFFF"
        opacity="0.07"
        dominant-baseline="auto"
        letter-spacing="-4"
        clip-path="url(#cardClip)">Z</text>

  <!-- ZLDR -->
  <text x="96" y="74"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="44"
        fill="#FFFFFF"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-1">ZLDR</text>

  <!-- Blue accent underline -->
  <rect x="38" y="100" width="120" height="3" rx="1.5" fill="#3B82F6"/>

  <!-- EVENTS -->
  <text x="96" y="130"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="800"
        font-size="26"
        fill="#3B82F6"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="1">EVENTS</text>
</svg>
